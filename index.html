<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signal Library — 100 compressed podcasts</title>
<style>
:root {
  --bg: #0b0d10;
  --panel: #14171c;
  --panel-hover: #1b1f26;
  --text: #e6e8eb;
  --muted: #8b93a1;
  --accent: #6aa0ff;
  --border: #242832;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
header { padding: 48px 24px 20px; max-width: 1100px; margin: 0 auto; }
h1 { margin: 0 0 8px; font-size: 32px; letter-spacing: -0.5px; }
.sub { color: var(--muted); font-size: 15px; margin-bottom: 24px; }
.controls { display: flex; flex-wrap: wrap; gap: 12px; padding: 0 24px; max-width: 1100px; margin: 0 auto 24px; }
.controls input, .controls select {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none;
}
.controls input { flex: 1; min-width: 240px; }
.controls input:focus, .controls select:focus { border-color: var(--accent); }
.stats { color: var(--muted); font-size: 13px; padding: 0 24px 16px; max-width: 1100px; margin: 0 auto; }
.list { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; display: flex; flex-direction: column; gap: 10px; }
.card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 18px; display: grid; grid-template-columns: 1fr auto; gap: 8px 16px;
  transition: border-color 0.15s;
}
.card:hover { border-color: #2e3542; }
.card .show { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.card h3 { margin: 4px 0 6px; font-size: 17px; line-height: 1.3; font-weight: 600; }
.card .meta { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
.card .meta .dot { margin: 0 8px; opacity: 0.5; }
.card .speakers { color: var(--muted); font-size: 12px; font-style: italic; margin-top: 4px; }
.card audio { width: 100%; height: 36px; margin-top: 8px; grid-column: 1 / -1; }
.card .actions { grid-column: 1 / -1; display: flex; gap: 16px; margin-top: 4px; font-size: 13px; }
.badge { display: inline-block; background: #1f2530; padding: 3px 8px; border-radius: 4px; font-size: 11px; color: var(--muted); }
.error { background: #2a1414; border-color: #5a2020; color: #ff9090; padding: 12px 16px; border-radius: 8px; margin: 24px; }
.pending { color: #ffb86c; }
.footer { text-align: center; color: var(--muted); font-size: 12px; padding: 20px; }
@media (max-width: 600px) {
  header { padding: 24px 16px 12px; }
  h1 { font-size: 24px; }
  .list { padding: 0 12px 40px; }
  .card { padding: 14px; }
}
</style>
</head>
<body>
<header>
  <h1>🛰️ Signal Library</h1>
  <div class="sub">100 long-form podcasts, compressed to 5 minutes each. Same fidelity, 1/20th the time.</div>
</header>

<div class="controls">
  <input id="search" type="text" placeholder="Search show or title…" />
  <select id="showFilter"><option value="">All shows</option></select>
  <select id="sort">
    <option value="date_desc">Newest first</option>
    <option value="date_asc">Oldest first</option>
    <option value="show">By show</option>
    <option value="duration_desc">Longest first</option>
  </select>
</div>
<div class="stats" id="stats"></div>
<div id="root" class="list"></div>
<div class="footer">Generated by Signal · <a href="https://github.com/yimjason01-blip/signal-library">Source</a></div>

<script>
const root = document.getElementById('root');
const stats = document.getElementById('stats');
const search = document.getElementById('search');
const showFilter = document.getElementById('showFilter');
const sortSel = document.getElementById('sort');

let all = [];

function fmtDate(s) {
  try { return new Date(s).toLocaleDateString('en-US', {year: 'numeric', month: 'short', day: 'numeric'}); }
  catch (e) { return ''; }
}

function parseDate(s) { return new Date(s).getTime() || 0; }

function render() {
  const q = search.value.trim().toLowerCase();
  const showF = showFilter.value;
  const sort = sortSel.value;

  let list = all.slice();
  if (q) list = list.filter(e => (e.show + ' ' + e.title).toLowerCase().includes(q));
  if (showF) list = list.filter(e => e.show === showF);

  if (sort === 'date_desc') list.sort((a,b) => parseDate(b.pubdate) - parseDate(a.pubdate));
  else if (sort === 'date_asc') list.sort((a,b) => parseDate(a.pubdate) - parseDate(b.pubdate));
  else if (sort === 'show') list.sort((a,b) => (a.show+a.title).localeCompare(b.show+b.title));
  else if (sort === 'duration_desc') list.sort((a,b) => (b.duration_s||0) - (a.duration_s||0));

  const doneCount = all.filter(e => e.compressed).length;
  stats.textContent = `${list.length} of ${all.length} shown · ${doneCount}/${all.length} compressed`;

  root.innerHTML = list.map(e => {
    const compressed = e.compressed;
    const audioHtml = compressed
      ? `<audio controls preload="none" src="audio/${e.id}.mp3"></audio>`
      : `<div class="pending">⏳ Compressing…</div>`;
    const compressedBadge = compressed
      ? `<span class="badge">${Math.round(compressed.compressed_duration_s/60)}m out · ${compressed.mp3_size_mb || '?'}MB</span>`
      : '';
    const speakers = compressed && compressed.speakers && compressed.speakers.length
      ? `<div class="speakers">${compressed.speakers.join(' · ')}</div>` : '';
    const origMin = Math.round((e.duration_s||0)/60);
    return `<div class="card">
      <div>
        <div class="show">${escapeHtml(e.show)}</div>
        <h3>${escapeHtml(e.title)}</h3>
        <div class="meta">
          ${fmtDate(e.pubdate)} <span class="dot">·</span> ${origMin} min original ${compressedBadge}
        </div>
        ${speakers}
      </div>
      ${audioHtml}
      <div class="actions">
        <a href="${e.mp3_url}" target="_blank" rel="noopener">↗ Original mp3</a>
        ${compressed ? `<a href="meta/${e.id}.json" target="_blank">📄 Transcript JSON</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function init() {
  try {
    const r = await fetch('episodes.json');
    all = await r.json();
    const shows = [...new Set(all.map(e => e.show))].sort();
    showFilter.innerHTML = '<option value="">All shows</option>' +
      shows.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
    render();
  } catch (err) {
    root.innerHTML = `<div class="error">Failed to load episodes.json: ${err}</div>`;
  }
}

search.addEventListener('input', render);
showFilter.addEventListener('change', render);
sortSel.addEventListener('change', render);

init();
</script>
</body>
</html>
